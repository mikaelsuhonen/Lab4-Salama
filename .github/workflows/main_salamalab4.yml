# Docs for the Azure Web Apps Deploy action: https://github.com/Azure/webapps-deploy
# More GitHub Actions for Azure: https://github.com/Azure/actions

name: Build and deploy container app to Azure Web App - salamalab4

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read #This is required for actions/checkout

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2

      - name: Log in to container registry
        uses: docker/login-action@v2
        with:
          registry: salama.azurecr.io/
          username: ${{ secrets.AZUREAPPSERVICE_CONTAINERUSERNAME_E9D788973EC7472B996BEEB1EC97D755 }}
          password: ${{ secrets.AZUREAPPSERVICE_CONTAINERPASSWORD_33DF60CFFEEA4CF08C9336E8410DEC79 }}

      - name: Build and push container image to registry
        uses: docker/build-push-action@v3
        with:
          context: .
          push: true
          tags: salama.azurecr.io/${{ secrets.AZUREAPPSERVICE_CONTAINERUSERNAME_E9D788973EC7472B996BEEB1EC97D755 }}/salamabuild:${{ github.sha }}
          file: ./Dockerfile

  deploy:
    runs-on: ubuntu-latest
    
    needs: build
    
    steps:
      
      - name: Deploy to Azure Web App
        id: deploy-to-webapp
        uses: azure/webapps-deploy@v2
        with:
          app-name: 'salamalab4'
          slot-name: 'Production'
          images: 'salama.azurecr.io/${{ secrets.AZUREAPPSERVICE_CONTAINERUSERNAME_E9D788973EC7472B996BEEB1EC97D755 }}/salamabuild:${{ github.sha }}'
          publish-profile: ${{ secrets.AZUREAPPSERVICE_PUBLISHPROFILE_07A0FFBBABF644A2B88A7C56927834C0 }}